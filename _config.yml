# Site — Hydejack (remote_theme) + personal content
# Restart Jekyll after editing this file.

lang: en
title: "Wei Xiao's Homepage"
tagline: "I like Slow Science"
description: >
  Wei Xiao (肖巍) — reinforcement learning, embodied AI, and robotic foundation models.

keywords: [robotics, reinforcement learning, embodied AI, Wei Xiao]

repository: "XiaoWei-i/XiaoWei-i.github.io"
google_scholar_stats_use_cdn: true

google_analytics_id:
google_site_verification:
bing_site_verification:
baidu_site_verification:

logo: /images/head.jpg

author:
  name: "Wei Xiao (肖巍)"
  email: xiaowei2002103@foxmail.com
  picture: /images/head.jpg
  social:
    email: xiaowei2002103@foxmail.com
    github: XiaoWei-i

menu:
  - title: About Me
    url: /#about-me
  - title: News
    url: /#-news
  - title: Publications
    url: /#-publications
  - title: Honors and Awards
    url: /#-honors-and-awards
  - title: Google Scholar
    url: "https://scholar.google.cz/citations?user=kvcrdlUAAAAJ&hl=zh-CN"
  - title: Zhihu
    url: "https://www.zhihu.com/people/xiao-wei-7-38"
  - title: Xiaohongshu
    url: "https://www.xiaohongshu.com/user/profile/6062aa97000000000100857a"

copyright: "© 2024–2026 Wei Xiao. All rights reserved."

permalink: /:categories/:year-:month-:day-:title/
timezone: Asia/Shanghai

remote_theme: hydecorp/hydejack@v9.2.1

accent_image: /images/cover.jpg
accent_color: rgb(79, 177, 186)
theme_color: rgb(25, 55, 71)

google_fonts: Roboto+Slab:700|Noto+Sans:400,400i,700,700i
font: Noto Sans, Helvetica, Arial, sans-serif
font_heading: Roboto Slab, Helvetica, Arial, sans-serif

defaults:
  - scope:
      path: "assets"
    values:
      sitemap: false
  - scope:
      path: "_pages"
    values:
      layout: page
      sitemap: true
  - scope:
      type: projects
    values:
      seo:
        type: WebPage
  - scope:
      type: featured_categories
    values:
      seo:
        type: WebPage
  - scope:
      type: featured_tags
    values:
      seo:
        type: WebPage

collections:
  featured_categories:
    permalink: /:name/
    output: true
  featured_tags:
    permalink: /tag-:name/
    output: true
  projects:
    permalink: /projects/:path/
    output: true

hydejack:
  post_addons: [about, related, random]
  project_addons: [about, other]
  no_mark_external: false
  no_push_state: false
  no_drawer: false
  no_navbar: false
  no_search: true
  no_inline_css: false
  no_page_style: false
  no_break_layout: true
  no_toc: false
  no_third_column: false
  no_large_headings: false
  no_structured_data: false
  no_theme_color: false
  no_breadcrumbs: true
  use_lsi: false
  cookies_banner: false
  advertise: false
  hide_dates: false
  hide_last_modified: false
  dark_mode:
    always: false
    dynamic: true
    icon: true
  offline:
    enabled: false

include:
  - .htaccess
  - _pages
  - files

exclude:
  - docs
  - google_scholar_crawler
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - .github
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - README.md
  - Rakefile
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor
  - vendor/bundle

keep_files:
  - .git
  - .svn

encoding: utf-8
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false
  math_engine: mathjax
  footnote_backlink: "↩︎"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

sass:
  style: compressed

plugins:
  - jekyll-default-layout
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-redirect-from
  - jekyll-relative-links
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

relative_links:
  collections: true
